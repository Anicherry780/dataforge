services:
  - type: web
    name: dataforge-api
    env: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ALLOWED_ORIGINS
        value: https://etl.anirudhdev.com
      - key: DB_PATH
        value: /tmp/dataforge.db
      - key: PYTHONUNBUFFERED
        value: "1"
